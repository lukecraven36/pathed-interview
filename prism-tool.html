<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Use Case Prioritiser | Simpson Associates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@v3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  :root {
    --sa-navy: #0F2D52;
    --sa-navy-deep: #081A33;
    --sa-teal: #00B0B9;
    --sa-teal-deep: #008B92;
    --sa-green: #6FCF73;
    --sa-coral: #FF6B5B;
    --sa-amber: #F4B73E;
    --sa-cream: #F7F5EF;
    --sa-paper: #FAFAF7;
    --sa-ink: #0B1726;
    --sa-mute: #5A6573;
    --sa-line: #E3E1D8;
    --shadow-soft: 0 1px 2px rgba(11,23,38,0.04), 0 8px 24px rgba(11,23,38,0.06);
    --shadow-lift: 0 4px 12px rgba(11,23,38,0.08), 0 24px 48px rgba(11,23,38,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Manrope', system-ui, sans-serif; background: var(--sa-paper); color: var(--sa-ink); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Hex motif background — subtle */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 10% 5%, rgba(0,176,185,0.04) 0, transparent 35%),
      radial-gradient(circle at 90% 90%, rgba(15,45,82,0.04) 0, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* Header */
  .topbar {
    background: var(--sa-navy);
    color: white;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--sa-teal);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 38px; height: 44px;
    display: grid; place-items: center;
    position: relative;
  }
  .brand-mark svg { width: 100%; height: 100%; }
  .brand-text { display: flex; flex-direction: column; line-height: 1.05; }
  .brand-text .sa { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
  .brand-text .sub { font-size: 11px; color: rgba(255,255,255,0.65); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 20px; font-size: 13px; color: rgba(255,255,255,0.75); }
  .pill { background: rgba(0,176,185,0.18); color: var(--sa-teal); padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; border: 1px solid rgba(0,176,185,0.35); }

  /* Page */
  .page { max-width: 1180px; margin: 0 auto; padding: 48px 40px 80px; }

  /* Landing */
  .hero {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 60px;
    align-items: center;
    margin-bottom: 60px;
  }
  .eyebrow { color: var(--sa-teal-deep); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
  h1 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 52px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--sa-navy);
    margin-bottom: 20px;
  }
  h1 em { font-style: italic; color: var(--sa-teal-deep); }
  .lede { font-size: 18px; line-height: 1.55; color: var(--sa-mute); max-width: 520px; margin-bottom: 32px; }
  .cta-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 26px;
    border-radius: 6px;
    transition: all 0.18s ease;
    letter-spacing: 0.2px;
  }
  .btn-primary {
    background: var(--sa-navy);
    color: white;
  }
  .btn-primary:hover { background: var(--sa-navy-deep); transform: translateY(-1px); }
  .btn-secondary {
    background: white;
    color: var(--sa-navy);
    border: 1.5px solid var(--sa-navy);
  }
  .btn-secondary:hover { background: var(--sa-navy); color: white; }
  .btn-ghost {
    background: transparent;
    color: var(--sa-navy);
    text-decoration: underline;
    text-underline-offset: 4px;
    padding: 14px 8px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Hex visual on right */
  .hex-stack {
    position: relative;
    height: 440px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hex {
    position: absolute;
    width: 140px; height: 161px;
    display: grid; place-items: center;
    color: white;
    font-weight: 700;
    text-align: center;
    padding: 0 16px;
    line-height: 1.2;
  }
  .hex svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hex span { position: relative; z-index: 1; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; }
  .hex.value { background: transparent; left: 35%; top: 20%; }
  .hex.value svg path { fill: var(--sa-teal); }
  .hex.risk { left: 55%; top: 40%; }
  .hex.risk svg path { fill: var(--sa-navy); }
  .hex.readiness { left: 40%; top: 60%; }
  .hex.readiness svg path { fill: var(--sa-green); }

  /* Cards row */
  .three-up { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 16px; }
  .card {
    background: white;
    border: 1px solid var(--sa-line);
    border-radius: 8px;
    padding: 26px 24px;
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }
  .card .stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--sa-teal);
  }
  .card.value .stripe { background: var(--sa-teal); }
  .card.risk .stripe { background: var(--sa-navy); }
  .card.readiness .stripe { background: var(--sa-green); }
  .card-num { font-family: 'Source Serif 4', serif; font-size: 36px; font-weight: 300; color: var(--sa-navy); margin-bottom: 4px; line-height: 1; font-style: italic; }
  .card h3 { font-size: 17px; font-weight: 700; color: var(--sa-navy); margin-bottom: 8px; letter-spacing: -0.2px; }
  .card p { font-size: 14px; color: var(--sa-mute); line-height: 1.55; }

  /* Customer chooser */
  .examples-section { margin-top: 64px; padding-top: 48px; border-top: 1px solid var(--sa-line); }
  .examples-section h2 { font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 400; color: var(--sa-navy); margin-bottom: 8px; letter-spacing: -0.01em; }
  .examples-section p.lead { color: var(--sa-mute); font-size: 15px; margin-bottom: 24px; }
  .case-card {
    background: white;
    border: 1px solid var(--sa-line);
    border-radius: 8px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .case-card:hover { border-color: var(--sa-teal); box-shadow: var(--shadow-lift); transform: translateY(-2px); }
  .case-sector { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sa-teal-deep); font-weight: 700; }
  .case-card h4 { font-size: 17px; color: var(--sa-navy); font-weight: 700; line-height: 1.25; }
  .case-card p { font-size: 13px; color: var(--sa-mute); line-height: 1.55; }
  .case-stats { display: flex; gap: 12px; margin-top: 6px; }
  .case-stat { background: var(--sa-cream); padding: 6px 10px; border-radius: 4px; font-size: 11px; color: var(--sa-navy); font-weight: 600; }

  /* Assessment screen */
  .assess-wrap { max-width: 880px; margin: 0 auto; }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 32px; }
  .progress-seg {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--sa-line);
    transition: background 0.25s ease;
  }
  .progress-seg.done { background: var(--sa-teal); }
  .progress-seg.current { background: var(--sa-navy); }

  .dimension-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .dimension-badge.value { background: rgba(0,176,185,0.12); color: var(--sa-teal-deep); }
  .dimension-badge.risk { background: rgba(15,45,82,0.08); color: var(--sa-navy); }
  .dimension-badge.readiness { background: rgba(111,207,115,0.18); color: #2E7A3A; }
  .dimension-badge::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
  }
  .dimension-badge.value::before { background: var(--sa-teal); }
  .dimension-badge.risk::before { background: var(--sa-navy); }
  .dimension-badge.readiness::before { background: var(--sa-green); }

  .question-text {
    font-family: 'Source Serif 4', serif;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.25;
    color: var(--sa-navy);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .question-context { color: var(--sa-mute); font-size: 15px; line-height: 1.55; margin-bottom: 32px; max-width: 700px; }
  .q-counter { font-size: 12px; color: var(--sa-mute); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; }

  .scale {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .scale-option {
    background: white;
    border: 1.5px solid var(--sa-line);
    border-radius: 8px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.16s ease;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 130px;
  }
  .scale-option:hover { border-color: var(--sa-teal); transform: translateY(-2px); box-shadow: var(--shadow-soft); }
  .scale-option.selected {
    border-color: var(--sa-navy);
    background: var(--sa-navy);
    color: white;
  }
  .scale-option .num {
    font-family: 'Source Serif 4', serif;
    font-size: 30px;
    font-weight: 300;
    font-style: italic;
    line-height: 1;
  }
  .scale-option.selected .num { color: var(--sa-teal); }
  .scale-option .lbl { font-size: 12px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; }
  .scale-option .desc { font-size: 11px; line-height: 1.45; opacity: 0.85; flex: 1; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .skip-link { color: var(--sa-mute); font-size: 13px; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; }
  .skip-link:hover { color: var(--sa-navy); }

  /* Results */
  .results-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; align-items: start; margin-bottom: 40px; }
  .verdict-card { background: var(--sa-navy); color: white; border-radius: 10px; padding: 36px; position: relative; overflow: hidden; }
  .verdict-card::after {
    content: '';
    position: absolute;
    right: -40px; bottom: -40px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(0,176,185,0.25) 0, transparent 65%);
    pointer-events: none;
  }
  .verdict-eyebrow { color: var(--sa-teal); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; }
  .verdict-card h2 { font-family: 'Source Serif 4', serif; font-size: 36px; font-weight: 400; line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.01em; }
  .verdict-card p { color: rgba(255,255,255,0.78); font-size: 15px; line-height: 1.55; margin-bottom: 22px; }
  .verdict-recommendation {
    background: rgba(255,255,255,0.08);
    border-left: 3px solid var(--sa-teal);
    padding: 14px 18px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.55;
  }

  .scores-list { display: flex; flex-direction: column; gap: 16px; }
  .score-row {
    background: white;
    border: 1px solid var(--sa-line);
    border-radius: 8px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .score-row:hover { border-color: var(--sa-teal); transform: translateY(-1px); box-shadow: var(--shadow-soft); }
  .score-row.expanded { border-color: var(--sa-navy); }
  .score-row-left { flex: 1; }
  .score-row-label-row { display: flex; align-items: center; gap: 8px; }
  .score-row-chevron { color: var(--sa-mute); font-size: 12px; transition: transform 0.2s ease; }
  .score-row.expanded .score-row-chevron { transform: rotate(90deg); color: var(--sa-teal-deep); }
  .score-row-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .score-row.value .score-row-label { color: var(--sa-teal-deep); }
  .score-row.risk .score-row-label { color: var(--sa-navy); }
  .score-row.readiness .score-row-label { color: #2E7A3A; }
  .score-row-meter { height: 6px; background: var(--sa-cream); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .score-row-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(.2,.8,.2,1); }
  .score-row.value .score-row-fill { background: var(--sa-teal); }
  .score-row.risk .score-row-fill { background: var(--sa-navy); }
  .score-row.readiness .score-row-fill { background: var(--sa-green); }
  .score-row-value { font-family: 'Source Serif 4', serif; font-size: 38px; font-weight: 300; font-style: italic; color: var(--sa-navy); line-height: 1; margin-left: 22px; }
  .score-row-value small { font-size: 14px; color: var(--sa-mute); font-style: normal; font-family: 'Manrope', sans-serif; }

  /* Detail panel */
  .detail-panel {
    background: white;
    border: 1px solid var(--sa-line);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .detail-panel h4 {
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--sa-navy);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .detail-panel .detail-sub {
    color: var(--sa-mute);
    font-size: 13px;
    margin-bottom: 22px;
  }
  .detail-row {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--sa-line);
    align-items: flex-start;
  }
  .detail-row:last-child { border-bottom: 0; }
  .detail-score-pill {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--sa-cream);
    display: grid;
    place-items: center;
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-style: italic;
    font-weight: 300;
    color: var(--sa-navy);
    border: 2px solid var(--sa-line);
  }
  .detail-panel.value .detail-score-pill { background: rgba(0,176,185,0.10); border-color: rgba(0,176,185,0.3); }
  .detail-panel.risk .detail-score-pill { background: rgba(15,45,82,0.08); border-color: rgba(15,45,82,0.2); }
  .detail-panel.readiness .detail-score-pill { background: rgba(111,207,115,0.18); border-color: rgba(111,207,115,0.4); }
  .detail-q-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--sa-navy);
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .detail-q-answer {
    font-size: 13px;
    color: var(--sa-mute);
    margin-bottom: 8px;
  }
  .detail-q-answer strong { color: var(--sa-ink); }
  .detail-q-rationale {
    font-size: 13px;
    line-height: 1.55;
    color: var(--sa-ink);
    font-style: italic;
    background: var(--sa-cream);
    padding: 10px 14px;
    border-left: 3px solid var(--sa-teal);
    border-radius: 4px;
  }
  .detail-q-rationale-empty {
    font-size: 12px;
    color: var(--sa-mute);
    font-style: italic;
  }

  /* Matrix */
  .matrix-section { background: white; border: 1px solid var(--sa-line); border-radius: 10px; padding: 32px; margin-bottom: 32px; }
  .matrix-section h3 { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 400; color: var(--sa-navy); margin-bottom: 6px; letter-spacing: -0.01em; }
  .matrix-section .sub { color: var(--sa-mute); font-size: 13px; margin-bottom: 24px; }
  .matrix-wrap {
    position: relative;
    height: 480px;
    padding: 20px 30px 50px 80px;
  }
  .matrix-grid {
    position: relative;
    height: 100%;
    width: 100%;
    border-left: 2px solid var(--sa-line);
    border-bottom: 2px solid var(--sa-line);
  }
  .matrix-quadrant {
    position: absolute;
    width: 50%;
    height: 50%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 14px 18px;
  }
  .matrix-quadrant.tl { top: 0; left: 0; background: rgba(0,176,185,0.04); }
  .matrix-quadrant.tr { top: 0; right: 0; background: rgba(0,176,185,0.10); }
  .matrix-quadrant.bl { bottom: 0; left: 0; background: rgba(90,101,115,0.04); }
  .matrix-quadrant.br { bottom: 0; right: 0; background: rgba(244,183,62,0.08); }
  .matrix-quad-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sa-mute); font-weight: 700; }
  .matrix-quad-title { font-size: 14px; font-weight: 700; color: var(--sa-navy); margin-top: 4px; }
  .matrix-quadrant.tr .matrix-quad-label { color: var(--sa-teal-deep); }

  /* Y axis label using writing-mode for clean vertical text */
  .matrix-ylabel {
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 50px;
    width: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    color: var(--sa-mute);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    pointer-events: none;
  }
  .matrix-xlabel {
    position: absolute;
    bottom: 16px;
    left: 80px;
    right: 30px;
    text-align: center;
    color: var(--sa-mute);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    pointer-events: none;
  }

  .matrix-point {
    position: absolute;
    border-radius: 50%;
    background: var(--sa-navy);
    color: white;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    transform: translate(-50%, 50%);
    box-shadow: 0 4px 16px rgba(15,45,82,0.35);
    border: 3px solid white;
    cursor: pointer;
    transition: transform 0.2s ease;
    z-index: 2;
  }
  .matrix-point:hover { transform: translate(-50%, 50%) scale(1.08); }
  .matrix-point-label {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--sa-navy);
    color: white;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 12px rgba(15,45,82,0.2);
  }
  .matrix-point-label::after {
    content: ''; position: absolute;
    top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--sa-navy);
  }

  /* Result actions */
  .actions-bar { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 24px; }

  /* Next-step CTA */
  .next-step-cta {
    background: linear-gradient(135deg, var(--sa-navy) 0%, var(--sa-navy-deep) 100%);
    color: white;
    border-radius: 12px;
    padding: 36px 40px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 30px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }
  .next-step-cta::after {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(0,176,185,0.18) 0, transparent 70%);
    pointer-events: none;
  }
  .next-step-cta-text { flex: 1 1 480px; position: relative; z-index: 1; }
  .next-step-eyebrow { color: var(--sa-teal); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
  .next-step-cta h3 { font-family: 'Source Serif 4', serif; font-size: 32px; font-weight: 400; color: white; margin-bottom: 10px; letter-spacing: -0.01em; }
  .next-step-cta p { color: rgba(255,255,255,0.78); font-size: 15px; line-height: 1.55; max-width: 580px; }

function Assessment({ scores, setScores, onComplete, onBack, customerName, setCustomerName, useCaseName, setUseCaseName }) {
  const [idx, setIdx] = useState(0);
  const [stage, setStage] = useState(customerName ? 'questions' : 'meta'); // 'meta' or 'questions'

  const total = FLAT_QUESTIONS.length;
  const q = FLAT_QUESTIONS[idx];
  const currentScore = q ? scores[q.id] : null;

  const select = (v) => {
    setScores(s => ({ ...s, [q.id]: v }));
    setTimeout(() => {
      if (idx < total - 1) setIdx(idx + 1);
      else onComplete();
    }, 220);
  };

  const back = () => setIdx(Math.max(0, idx - 1));
  const skip = () => {
    if (idx < total - 1) setIdx(idx + 1);
    else onComplete();
  };

  if (stage === 'meta') {
    return (
      <div className="page">
        <div className="assess-wrap">
          <button
            className="btn btn-ghost"
            onClick={onBack}
            style={{ marginBottom: 20, marginLeft: -8 }}
          >← Back to home</button>
          <div className="dimension-badge value" style={{ background: 'rgba(15,45,82,0.08)', color: 'var(--sa-navy)' }}>
            Step 1 of 2 · Set up
          </div>
          <h2 className="question-text" style={{ fontSize: 36 }}>Who is this assessment for?</h2>
          <p className="question-context">A quick label so the output is meaningful when you export it.</p>

          <div style={{ display: 'grid', gap: 20, marginBottom: 32 }}>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', color: 'var(--sa-mute)' }}>Customer / Organisation</span>
              <input
                type="text"
                placeholder="e.g. North Yorkshire Council"
                value={customerName}
                onChange={(e) => setCustomerName(e.target.value)}
                style={{
                  border: '1.5px solid var(--sa-line)',
                  borderRadius: 6,
                  padding: '14px 16px',
                  fontSize: 16,
                  fontFamily: 'inherit',
                  background: 'white',
                }}
              />
            </label>

            <label style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', color: 'var(--sa-mute)' }}>Use Case</span>
              <input
                type="text"
                placeholder="e.g. AI-powered insight engine for case management"
                value={useCaseName}
                onChange={(e) => setUseCaseName(e.target.value)}
                style={{
                  border: '1.5px solid var(--sa-line)',
                  borderRadius: 6,
                  padding: '14px 16px',
                  fontSize: 16,
                  fontFamily: 'inherit',
                  background: 'white',
                }}
              />
            </label>
          </div>

          <button
            className="btn btn-primary"
            disabled={!customerName.trim() || !useCaseName.trim()}
            onClick={() => setStage('questions')}
          >Begin the 15 questions →</button>
        </div>
      </div>
    );
  }

  // Progress segments — 3 dimensions, 5 each
  const dimensionIdx = (i) => i < 5 ? 0 : i < 10 ? 1 : 2;

  return (
    <div className="page">
      <div className="assess-wrap">
        <button
          className="btn btn-ghost"
          onClick={onBack}
          style={{ marginBottom: 20, marginLeft: -8 }}
        >← Back to home</button>
        <div className="progress-bar">
          {FLAT_QUESTIONS.map((_, i) => {
            const cls = i < idx ? 'done' : i === idx ? 'current' : '';
            return <div key={i} className={`progress-seg ${cls}`} />;
          })}
        </div>

        <div className="q-counter">Question {idx + 1} of {total} · {customerName} — {useCaseName}</div>

        <div className={`dimension-badge ${q.dimension}`}>
          {q.dimension === 'value' && 'Value · how much will it create'}
          {q.dimension === 'risk' && 'Risk · what could go wrong'}
          {q.dimension === 'readiness' && 'Readiness · can we deliver it'}
        </div>

        <div className="question-text">{q.text}</div>
        <p className="question-context">{q.context}</p>

        <div className="scale">
          {q.scale.map(opt => (
            <button
              key={opt.v}
              className={`scale-option ${currentScore === opt.v ? 'selected' : ''}`}
              onClick={() => select(opt.v)}
            >
              <span className="num">{opt.v}</span>
              <span className="lbl">{opt.label}</span>
              <span className="desc">{opt.desc}</span>
            </button>
          ))}
        </div>

        <div className="nav-row">
          <button className="btn btn-secondary" onClick={back} disabled={idx === 0}>← Back</button>
          <span className="skip-link" onClick={skip}>Skip this question →</span>
        </div>
      </div>
    </div>
  );
}

function avg(scores, ids) {
  const vals = ids.map(id => scores[id]).filter(v => typeof v === 'number');
  if (!vals.length) return 0;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

function getVerdict(value, risk, readiness) {
  if (value >= 3.5 && risk <= 3 && readiness >= 3.5) {
    return {
      title: 'Lighthouse — start now.',
      summary: 'High value, manageable risk, strong readiness. This is the use case to fund, sponsor and turn into a story.',
      recommendation: 'Recommend a 6–8 week Proof of Value engagement. Embed responsible-AI guardrails from day one. Position as a sector lighthouse so the success unlocks the wider portfolio.',
    };
  }
  if (value >= 3.5 && risk >= 3.5) {
    return {
      title: 'High reward, but eyes wide open.',
      summary: 'Real value sits inside this use case — but so does material risk. Treat as strategic, not a quick win.',
      recommendation: 'Begin with an AI Readiness Assessment and a focused Responsible AI design phase. Engage the Ethics & Risk Review Board early. Structure delivery in phased gates with human-in-the-loop by default.',
    };
  }
  if (value >= 3.5 && readiness < 3) {
    return {
      title: 'Valuable, but not yet deliverable.',
      summary: 'The prize is real, but the organisation isn\'t ready to capture it today.',
      recommendation: 'Park as a target use case. Use this assessment to define the foundation work needed — data, platform, sponsorship, governance — and revisit in 3–6 months.',
    };
  }
  if (value < 2.5 && risk < 2.5) {
    return {
      title: 'Quick win — useful, but not the headline.',
      summary: 'Low-risk and easy to deliver. Worth doing for productivity, but unlikely to be the case study Simpson builds the year around.',
      recommendation: 'Deliver as a packaged productivity engagement. Use it to demonstrate momentum while higher-value use cases mature.',
    };
  }
  return {
    title: 'Worth a closer conversation.',
    summary: 'The numbers don\'t scream "go" or "park" — which usually means the next step is shaping, not scoring.',
    recommendation: 'Run a focused half-day workshop with the use case sponsor to sharpen scope, sharpen the value hypothesis and decide whether to invest in a Proof of Value.',
  };
}

        </p>
      </div>

      {isPreloaded && preloadedHeadlines && (
        <div className="matrix-section" style={{ background: 'var(--sa-cream)', borderColor: 'var(--sa-line)' }}>
          <h3>{plan ? 'Headline opportunity' : 'What actually happened'}</h3>
          <p className="sub">
            {plan

  if (!plan) {
    // Defensive — shouldn't happen since we only show PlanView when plan exists
    return (
      <div className="page">
        <button className="btn btn-ghost" onClick={onBack} style={{ marginBottom: 20 }}>← Back to results</button>
        <h2>No plan available</h2>
        <p>This use case doesn't have a planned solution attached.</p>
      </div>
    );
  }

  const { architecture, estimate, roadmap, isHypothetical } = plan;

  // Estimate: compute Investment vs Return positioning
  // Convention: x = inverted investment (RIGHT = low investment = good), y = return (UP = high = good)
  // So sweet spot = TOP RIGHT (low investment, high return)
  const investmentLevel = estimate.costGBP.oneOffTotal < 100000 ? 1
    : estimate.costGBP.oneOffTotal < 200000 ? 2
    : estimate.costGBP.oneOffTotal < 350000 ? 3
    : estimate.costGBP.oneOffTotal < 600000 ? 4
    : 5;
  const returnLevel = estimate.roi.annualisedReturn < 250000 ? 1
    : estimate.roi.annualisedReturn < 750000 ? 2
    : estimate.roi.annualisedReturn < 1500000 ? 3
    : estimate.roi.annualisedReturn < 3000000 ? 4
    : 5;
  // X: inverted — low investment ends up at RIGHT
  const irX = ((6 - investmentLevel) / 5) * 100;
  const irY = (returnLevel / 5) * 100;

  // Formatter
  const fmtGBP = (n) => {
    if (n >= 1000000) return '£' + (n/1000000).toFixed(1) + 'm';
    if (n >= 1000) return '£' + Math.round(n/1000) + 'k';
    return '£' + n;

                    <span className="roadmap-gate">Phase gate</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    });

    addFooter(s6, 6);

    // ---------- SLIDE 7: TEAM & FRAMEWORKS ----------
    const s7 = pptx.addSlide();
    s7.background = { color: PAPER };

    s7.addText('THE PLAN · STAGE 2 OF 4', { x: 0.6, y: 0.4, w: 10, h: 0.3, fontSize: 11, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    s7.addText('Team & frameworks', { x: 0.6, y: 0.7, w: 12, h: 0.6, fontSize: 36, color: NAVY, fontFace: 'Georgia' });

    // Left column: team
    s7.addText('SIMPSON TEAM REQUIRED', { x: 0.6, y: 1.7, w: 6, h: 0.3, fontSize: 10, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    architecture.capabilities.slice(0, 7).forEach((c, i) => {
      const y = 2.05 + i * 0.72;
      s7.addShape(pptx.ShapeType.rect, { x: 0.6, y, w: 6.0, h: 0.62, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });
      s7.addText(c.role, { x: 0.8, y: y + 0.06, w: 4.0, h: 0.3, fontSize: 11, color: NAVY, fontFace: 'Calibri', bold: true });
      s7.addText(c.days, { x: 4.8, y: y + 0.06, w: 1.7, h: 0.3, fontSize: 9, color: TEAL, fontFace: 'Calibri', bold: true, align: 'right' });
      const purposeShort = c.purpose.length > 95 ? c.purpose.substring(0, 92) + '…' : c.purpose;
      s7.addText(purposeShort, { x: 0.8, y: y + 0.32, w: 5.7, h: 0.28, fontSize: 9, color: MUTE, fontFace: 'Calibri' });
    });

    // Right column: frameworks
    s7.addText('REFERENCE FRAMEWORKS', { x: 6.9, y: 1.7, w: 6, h: 0.3, fontSize: 10, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    architecture.frameworks.slice(0, 6).forEach((f, i) => {
      const y = 2.05 + i * 0.78;
      s7.addShape(pptx.ShapeType.rect, { x: 6.9, y, w: 5.8, h: 0.68, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });
      s7.addShape(pptx.ShapeType.rect, { x: 6.9, y, w: 0.06, h: 0.68, fill: { color: TEAL }, line: { color: TEAL } });
      s7.addText(f.name, { x: 7.1, y: y + 0.07, w: 5.5, h: 0.3, fontSize: 11, color: NAVY, fontFace: 'Calibri', bold: true });
      const whyShort = f.why.length > 110 ? f.why.substring(0, 107) + '…' : f.why;
      s7.addText(whyShort, { x: 7.1, y: y + 0.34, w: 5.5, h: 0.3, fontSize: 9, color: MUTE, fontFace: 'Calibri' });
    });

    addFooter(s7, 7);

    // ---------- SLIDE 8: EFFORT / COST / ROI ----------
    const s8 = pptx.addSlide();
    s8.background = { color: PAPER };

    s8.addText('THE PLAN · STAGE 3 OF 4', { x: 0.6, y: 0.4, w: 10, h: 0.3, fontSize: 11, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    s8.addText('Effort, cost and return', { x: 0.6, y: 0.7, w: 12, h: 0.6, fontSize: 36, color: NAVY, fontFace: 'Georgia' });

    // Three headline cards
    const ehY = 1.7;
    const headlines = [
      { label: 'EFFORT', value: estimate.effortDays, unit: 'days', sub: 'Consultant days across Discover → Scale, blended team of 5–7.', colour: AMBER },
      { label: 'INVESTMENT', value: fmtGBP(estimate.costGBP.oneOffTotal), unit: '', sub: `One-off Discover → Build. Plus ${fmtGBP(estimate.costGBP.annualisedRun)} annualised run.`, colour: CORAL },
      { label: 'ANNUAL RETURN', value: fmtGBP(estimate.roi.annualisedReturn), unit: '', sub: `Payback in ${estimate.roi.paybackMonths} months. ${fmtGBP(estimate.roi.threeYearNPV)} 3-year NPV.`, colour: '2E7A3A' },
    ];
    headlines.forEach((h, i) => {
      const x = 0.6 + i * 4.1;
      s8.addShape(pptx.ShapeType.rect, { x, y: ehY, w: 3.95, h: 2.0, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });
      s8.addShape(pptx.ShapeType.rect, { x, y: ehY, w: 3.95, h: 0.06, fill: { color: h.colour }, line: { color: h.colour } });
      s8.addText(h.label, { x: x + 0.25, y: ehY + 0.2, w: 3.5, h: 0.3, fontSize: 10, color: h.colour, fontFace: 'Calibri', bold: true, charSpacing: 3 });
      s8.addText(String(h.value), { x: x + 0.25, y: ehY + 0.6, w: 2.8, h: 0.9, fontSize: 56, color: NAVY, fontFace: 'Georgia', italic: true });
      if (h.unit) s8.addText(h.unit, { x: x + 2.0, y: ehY + 0.95, w: 1.6, h: 0.4, fontSize: 16, color: MUTE, fontFace: 'Calibri' });
      s8.addText(h.sub, { x: x + 0.25, y: ehY + 1.55, w: 3.5, h: 0.5, fontSize: 10, color: MUTE, fontFace: 'Calibri', valign: 'top' });
    });

    // Investment vs Return mini-grid
    const cx = 1.2, cy = 3.95, cw = 6.0, ch = 2.7;

    s8.addText('INVESTMENT vs RETURN', { x: cx - 0.6, y: cy - 0.35, w: 6, h: 0.3, fontSize: 10, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });

    // Quadrants — Sweet spot is TOP RIGHT
    s8.addShape(pptx.ShapeType.rect, { x: cx, y: cy, w: cw/2, h: ch/2, fill: { color: 'FAF5E7' }, line: { color: 'E3E1D8' } });
    s8.addShape(pptx.ShapeType.rect, { x: cx + cw/2, y: cy, w: cw/2, h: ch/2, fill: { color: 'EBF7EC' }, line: { color: 'E3E1D8' } });
    s8.addShape(pptx.ShapeType.rect, { x: cx, y: cy + ch/2, w: cw/2, h: ch/2, fill: { color: 'F8EFEC' }, line: { color: 'E3E1D8' } });
    s8.addShape(pptx.ShapeType.rect, { x: cx + cw/2, y: cy + ch/2, w: cw/2, h: ch/2, fill: { color: 'F0EFEC' }, line: { color: 'E3E1D8' } });

    s8.addText('Strong return\nfor higher spend', { x: cx + 0.1, y: cy + 0.1, w: cw/2 - 0.2, h: 0.5, fontSize: 9, color: MUTE, fontFace: 'Calibri', bold: true });
    s8.addText('★ SWEET SPOT', { x: cx + cw/2 + 0.1, y: cy + 0.1, w: cw/2 - 0.2, h: 0.3, fontSize: 9, color: '2E7A3A', fontFace: 'Calibri', bold: true, charSpacing: 1 });
    s8.addText('Caution', { x: cx + 0.1, y: cy + ch - 0.35, w: cw/2 - 0.2, h: 0.3, fontSize: 9, color: MUTE, fontFace: 'Calibri', bold: true });
    s8.addText('Marginal', { x: cx + cw/2 + 0.1, y: cy + ch - 0.35, w: cw/2 - 0.2, h: 0.3, fontSize: 9, color: MUTE, fontFace: 'Calibri', bold: true });

    // Bubble: X = INVERTED investment (RIGHT = low invest), Y = return (TOP = high return)
    // Sweet spot is top-right = low invest + high return
    const ilvl = estimate.costGBP.oneOffTotal < 100000 ? 1
      : estimate.costGBP.oneOffTotal < 200000 ? 2
      : estimate.costGBP.oneOffTotal < 350000 ? 3
      : estimate.costGBP.oneOffTotal < 600000 ? 4
      : 5;
    const rlvl = estimate.roi.annualisedReturn < 250000 ? 1
      : estimate.roi.annualisedReturn < 750000 ? 2
      : estimate.roi.annualisedReturn < 1500000 ? 3
      : estimate.roi.annualisedReturn < 3000000 ? 4
      : 5;

    const bx = cx + ((6 - ilvl) / 5) * cw; // inverted: high invest=LEFT, low invest=RIGHT
    const byFromTop = cy + ((5 - rlvl) / 5) * ch; // high return = top
    const bubW = 0.55;
    s8.addShape(pptx.ShapeType.ellipse, { x: bx - bubW/2, y: byFromTop - bubW/2, w: bubW, h: bubW, fill: { color: NAVY }, line: { color: 'FFFFFF', width: 3 } });
    s8.addText(estimate.roi.paybackMonths + 'mo', { x: bx - bubW/2, y: byFromTop - bubW/2, w: bubW, h: bubW, fontSize: 9, color: 'FFFFFF', fontFace: 'Calibri', bold: true, align: 'center', valign: 'middle' });

    // Axis labels — X inverted to match the sweet spot in TR
    s8.addText('← Higher investment     ·     Lower investment →', { x: cx, y: cy + ch + 0.05, w: cw, h: 0.25, fontSize: 9, color: MUTE, fontFace: 'Calibri', bold: true, align: 'center' });
    s8.addText('↑ Higher return', { x: cx - 1.0, y: cy + 0.1, w: 0.9, h: 0.3, fontSize: 8, color: MUTE, fontFace: 'Calibri', bold: true });
    s8.addText('↓ Lower return', { x: cx - 1.0, y: cy + ch - 0.35, w: 0.9, h: 0.3, fontSize: 8, color: MUTE, fontFace: 'Calibri', bold: true });

    // Right side: phase breakdown
    const peX = 7.7, peY = 3.95, peW = 4.9, peH = 2.7;
    s8.addShape(pptx.ShapeType.rect, { x: peX, y: peY, w: peW, h: peH, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });
    s8.addText('EFFORT BY PHASE', { x: peX + 0.2, y: peY + 0.12, w: peW - 0.4, h: 0.3, fontSize: 10, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    const maxDays = Math.max(...estimate.effortByPhase.map(p => p.days));
    estimate.effortByPhase.forEach((p, i) => {
      const py = peY + 0.55 + i * 0.4;
      const colours = [TEAL, '00B0B9', NAVY, '4A6A91', GREEN];
      s8.addText(p.phase, { x: peX + 0.2, y: py, w: 1.0, h: 0.3, fontSize: 10, color: NAVY, fontFace: 'Calibri', bold: true });
      // Bar
      const barX = peX + 1.25;
      const barW = peW - 2.4;
      s8.addShape(pptx.ShapeType.rect, { x: barX, y: py + 0.04, w: barW, h: 0.18, fill: { color: CREAM }, line: { color: CREAM } });
      s8.addShape(pptx.ShapeType.rect, { x: barX, y: py + 0.04, w: barW * (p.days / maxDays), h: 0.18, fill: { color: colours[i] }, line: { color: colours[i] } });
      s8.addText(`${p.days}d`, { x: peX + peW - 1.0, y: py, w: 0.8, h: 0.3, fontSize: 10, color: MUTE, fontFace: 'Calibri', bold: true, align: 'right' });
    });

    addFooter(s8, 8);

    // ---------- SLIDE 9: ROADMAP ----------
    const s9 = pptx.addSlide();
    s9.background = { color: PAPER };

    s9.addText('THE PLAN · STAGE 4 OF 4', { x: 0.6, y: 0.4, w: 10, h: 0.3, fontSize: 11, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 3 });
    s9.addText('Roadmap', { x: 0.6, y: 0.7, w: 12, h: 0.6, fontSize: 36, color: NAVY, fontFace: 'Georgia' });

    // Phase chevrons / cards across the top
    const rmY = 1.85;
    const rmH = 1.1;
    const rmCardW = 2.36;
    roadmap.forEach((p, i) => {
      const x = 0.6 + i * (rmCardW + 0.06);
      const colours = [TEAL, '00B0B9', NAVY, '4A6A91', '2E7A3A'];
      const fg = i % 2 === 0 ? NAVY : NAVY;
      s9.addShape(pptx.ShapeType.rect, { x, y: rmY, w: rmCardW, h: rmH, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });
      s9.addShape(pptx.ShapeType.rect, { x, y: rmY, w: rmCardW, h: 0.08, fill: { color: colours[i] }, line: { color: colours[i] } });
      s9.addText(String(i+1), { x: x + 0.18, y: rmY + 0.2, w: 0.5, h: 0.4, fontSize: 22, color: colours[i], fontFace: 'Georgia', italic: true, bold: true });
      s9.addText(p.phase, { x: x + 0.75, y: rmY + 0.2, w: rmCardW - 0.9, h: 0.34, fontSize: 14, color: NAVY, fontFace: 'Calibri', bold: true });
      s9.addText(p.weeks, { x: x + 0.75, y: rmY + 0.55, w: rmCardW - 0.9, h: 0.25, fontSize: 9, color: MUTE, fontFace: 'Calibri' });
      const objShort = p.objective.length > 70 ? p.objective.substring(0, 67) + '…' : p.objective;
      s9.addText(objShort, { x: x + 0.2, y: rmY + 0.78, w: rmCardW - 0.3, h: 0.3, fontSize: 9, color: MUTE, fontFace: 'Calibri', italic: true });
    });

    // Below: detail for each phase in a compact 5-col grid
    const dtY = 3.2;
    const dtH = 3.6;
    roadmap.forEach((p, i) => {
      const x = 0.6 + i * (rmCardW + 0.06);
      s9.addShape(pptx.ShapeType.rect, { x, y: dtY, w: rmCardW, h: dtH, fill: { color: 'FFFFFF' }, line: { color: 'E3E1D8' } });

      // Activities heading
      s9.addText('KEY ACTIVITIES', { x: x + 0.15, y: dtY + 0.12, w: rmCardW - 0.3, h: 0.25, fontSize: 8, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 1.5 });
      const activitiesText = p.keyActivities.slice(0, 3).map(a => '• ' + (a.length > 55 ? a.substring(0, 52) + '…' : a)).join('\n');
      s9.addText(activitiesText, { x: x + 0.15, y: dtY + 0.38, w: rmCardW - 0.3, h: 1.4, fontSize: 8, color: INK, fontFace: 'Calibri', valign: 'top' });

      // Deliverables heading
      s9.addText('DELIVERABLES', { x: x + 0.15, y: dtY + 1.85, w: rmCardW - 0.3, h: 0.25, fontSize: 8, color: TEAL, fontFace: 'Calibri', bold: true, charSpacing: 1.5 });
      const delsText = p.deliverables.slice(0, 3).map(d => '• ' + (d.length > 55 ? d.substring(0, 52) + '…' : d)).join('\n');
      s9.addText(delsText, { x: x + 0.15, y: dtY + 2.1, w: rmCardW - 0.3, h: 0.9, fontSize: 8, color: INK, fontFace: 'Calibri', valign: 'top' });

      // Gate
      s9.addShape(pptx.ShapeType.rect, { x: x + 0.15, y: dtY + dtH - 0.55, w: rmCardW - 0.3, h: 0.4, fill: { color: NAVY }, line: { color: NAVY } });
      const gateShort = p.gate.length > 50 ? p.gate.substring(0, 47) + '…' : p.gate;
      s9.addText('GATE · ' + gateShort, { x: x + 0.25, y: dtY + dtH - 0.5, w: rmCardW - 0.5, h: 0.3, fontSize: 8, color: 'FFFFFF', fontFace: 'Calibri', bold: true });
    });

    addFooter(s9, 9);
  }

  // Save
  const safeName = customerName.replace(/[^a-z0-9]/gi, '_');
  pptx.writeFile({ fileName: `${safeName}_AI_Use_Case_Assessment.pptx` });
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const [stage, setStage] = useState('landing'); // landing | assess | results | plan
  const [scores, setScores] = useState({});
  const [customerName, setCustomerName] = useState('');
  const [useCaseName, setUseCaseName] = useState('');
  const [isPreloaded, setIsPreloaded] = useState(false);
  const [preloadedHeadlines, setPreloadedHeadlines] = useState(null);
  const [rationale, setRationale] = useState(null);
  const [plan, setPlan] = useState(null); // architecture, estimate, roadmap (only present for preloaded with plan)

  const startBlank = () => {
    setScores({});
    setCustomerName('');
    setUseCaseName('');
    setIsPreloaded(false);
    setPreloadedHeadlines(null);
    setRationale(null);
    setPlan(null);
    setStage('assess');
  };

  const loadCase = (key) => {
    const c = PRELOADED[key];
    setScores(c.scores);
    setCustomerName(c.customer);
    setUseCaseName(c.useCase);
    setIsPreloaded(true);
    setPreloadedHeadlines(c.headlines);
    setRationale(c.rationale || null);
    // Only Meridian (or future cases) have an architecture/estimate/roadmap bundle
    if (c.architecture && c.estimate && c.roadmap) {
      setPlan({ architecture: c.architecture, estimate: c.estimate, roadmap: c.roadmap, isHypothetical: c.isHypothetical });
    } else {
      setPlan(null);
    }
    setStage('results');
  };

  const restart = () => {
    setStage('landing');
    setScores({});
    setCustomerName('');
    setUseCaseName('');
    setIsPreloaded(false);
    setPreloadedHeadlines(null);
    setRationale(null);
    setPlan(null);
  };

  const goToPlan = () => setStage('plan');
  const goBackToResults = () => setStage('results');

  const handleExport = () => {
    exportPpt(scores, customerName, useCaseName, isPreloaded, preloadedHeadlines, rationale, plan);
  };

  return (
    <div className="app">
      <div className="topbar">
        <Logo />
        <div className="topbar-right">
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <a href="./index.html" style={{display:'inline-flex',alignItems:'center',gap:'7px',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.8)',textDecoration:'none',fontFamily:'inherit',fontSize:'12px',fontWeight:'600',padding:'7px 14px',borderRadius:'6px',letterSpacing:'0.3px'}}>⌂ Home</a>
            <span className="pill">AI Use Case Prioritiser · Concept</span>
          </div>
        </div>
      </div>

      {stage === 'landing' && <Landing onStartBlank={startBlank} onLoadCase={loadCase} />}
      {stage === 'assess' && (
        <Assessment
          scores={scores}
          setScores={setScores}
          onComplete={() => setStage('results')}
          onBack={restart}
          customerName={customerName}
          setCustomerName={setCustomerName}
          useCaseName={useCaseName}
          setUseCaseName={setUseCaseName}
        />
      )}
      {stage === 'results' && (
        <Results
          scores={scores}
          customerName={customerName}
          useCaseName={useCaseName}
          onRestart={restart}
          onExport={handleExport}
          isPreloaded={isPreloaded}
          preloadedHeadlines={preloadedHeadlines}
          rationale={rationale}
          plan={plan}
          onBuildPlan={goToPlan}
        />
      )}
      {stage === 'plan' && (
        <PlanView
          customerName={customerName}
          useCaseName={useCaseName}
          plan={plan}
          onBack={goBackToResults}
          onRestart={restart}
          onExport={handleExport}
        />
      )}

      <div className="footer-bar">
        <div>© 2026 · A concept built for Simpson Associates by Luke Craven</div>
        <div className="badge-row">
          <span>Inspired by Zygens DDAD · Simplified for Presales</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
